<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Censor Studio</title>
    <link rel="stylesheet" href="./styles.css?v=2026.04.15-06" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Image Censor Studio</h1>
        <div class="headerMeta" aria-live="polite">
          <span id="modeInfo" class="modeInfo"></span>
          <span id="buildInfo" class="buildInfo"></span>
        </div>
      </header>

      <section id="dropzone" class="dropzone compactDropzone" aria-label="画像のドロップ領域">
        <p><strong>画像をドロップ / タップ</strong></p>
        <label id="pickButton" class="pickButton" for="fileInput">画像を選択</label>
        <input id="fileInput" type="file" accept="image/*" />
      </section>

      <section id="previewArea" class="preview" aria-label="画像プレビュー領域">
        <canvas id="resultCanvas" class="canvas" aria-label="処理結果"></canvas>
        <div id="blockedTextEditor" class="blockedTextEditor is-hidden">
          <input
            id="blockedTextEditorInput"
            type="text"
            maxlength="24"
            value="BLOCKED"
            placeholder="BLOCKED"
            aria-label="目線テキスト編集"
          />
        </div>
      </section>
      <section id="imagePickerCompact" class="imagePickerCompact" hidden>
        <label id="changeImageButton" class="pickButton smallPickButton" for="fileInput">別の画像を選択</label>
      </section>

      <section class="controls compactControls">
        <div class="controlStack">
          <label class="control control-slider">
            <span>モザイク強度</span>
            <input id="mosaicScale" type="range" min="6" max="40" value="14" />
          </label>
        </div>

        <div class="actionGrid">
          <button id="processButton" type="button" disabled>顔を検出してモザイク</button>
          <button id="addMosaicButton" type="button" disabled>モザイク追加</button>
          <button id="addBlockedButton" type="button" disabled>目線追加</button>
          <button id="deleteEffectButton" type="button" disabled>選択を削除</button>
        </div>
      </section>

      <p id="status" class="status compactStatus">モデルを読み込み中...</p>
      <p class="editorHelp">
        枠をドラッグで移動、四隅ハンドルでサイズ変更、上の丸で回転。スマホはタップで選択・長押し気味で操作すると安定します。
      </p>
      <section class="saveBar" aria-label="保存操作">
        <button id="downloadButton" type="button" class="saveButton" disabled>画像を保存</button>
      </section>
    </main>

    <script src="./app.js?v=2026.04.15-08"></script>
  </body>
</html>
