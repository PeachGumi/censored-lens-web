<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Censor Studio</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>Image Censor Studio</h1>
        <p>画像を選んで、顔モザイクと目線をスマホでも直感的に編集できます。</p>
      </header>

      <section id="dropzone" class="dropzone" aria-label="画像のドロップ領域">
        <p><strong>ここに画像をドロップ</strong></p>
        <p>またはタップ</p>
        <button id="pickButton" type="button">画像を選択</button>
        <input id="fileInput" type="file" accept="image/*" hidden />
      </section>

      <section class="controls">
        <div class="controlStack">
          <label class="control control-slider">
            <span>モザイク強度</span>
            <input id="mosaicScale" type="range" min="6" max="40" value="14" />
          </label>
          <label class="control control-check">
            <input id="blockedToggle" type="checkbox" checked />
            <span>目線「BLOCKED」を表示</span>
          </label>
        </div>

        <div class="actionGrid">
          <button id="processButton" type="button" disabled>顔を検出してモザイク</button>
          <button id="addMosaicButton" type="button" disabled>モザイク追加</button>
          <button id="addBlockedButton" type="button" disabled>目線追加</button>
          <button id="deleteEffectButton" type="button" disabled>選択を削除</button>
        </div>
      </section>

      <p id="status" class="status">モデルを読み込み中...</p>
      <p class="editorHelp">
        枠をドラッグで移動、四隅ハンドルでサイズ変更、上の丸で回転。スマホはタップで選択・長押し気味で操作すると安定します。
      </p>
      <section class="preview" aria-label="画像プレビュー領域">
        <canvas id="resultCanvas" class="canvas" aria-label="処理結果"></canvas>
      </section>
      <section class="saveBar" aria-label="保存操作">
        <button id="downloadButton" type="button" class="saveButton" disabled>画像を保存</button>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
